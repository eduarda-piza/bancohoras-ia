<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Novo Funcionário · BancoHoras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bh-layout">

  <div th:replace="~{fragments/layout :: sidebar}"></div>

  <div class="bh-main">
    <div th:replace="~{fragments/layout :: topbar('Novo Funcionário')}"></div>

    <main class="bh-content">

      <!-- Flash -->
      <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex gap-2 mb-3">
        <i class="bi bi-check-circle-fill"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="bh-card">
            <div class="d-flex align-items-center gap-2 mb-4">
              <div class="bh-metric-icon" style="background:#eff6ff;">
                <i class="bi bi-person-plus-fill text-primary"></i>
              </div>
              <div>
                <h5 class="fw-bold mb-0">Cadastrar Novo Funcionário</h5>
                <p class="text-muted mb-0" style="font-size:.82rem;">Preencha os dados abaixo para cadastrar</p>
              </div>
            </div>

            <form th:action="@{/funcionarios/novo}" method="post" th:object="${funcionario}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

              <div class="row g-3">

                <div class="col-md-6">
                  <label class="form-label fw-semibold" for="nome">Nome Completo <span class="text-danger">*</span></label>
                  <input type="text" id="nome" name="nome" class="form-control"
                         th:value="${funcionario != null ? funcionario.nome : ''}"
                         placeholder="Ex: Rafael Souza" required/>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold" for="cargo">Cargo <span class="text-danger">*</span></label>
                  <input type="text" id="cargo" name="cargo" class="form-control"
                         th:value="${funcionario != null ? funcionario.cargo : ''}"
                         placeholder="Ex: Dev Sênior" required/>
                </div>

                <div class="col-12">
                  <label class="form-label fw-semibold" for="email">E-mail</label>
                  <input type="email" id="email" name="email" class="form-control"
                         th:value="${funcionario != null ? funcionario.email : ''}"
                         placeholder="Ex: rafael.souza@empresa.com"/>
                </div>

                <div class="col-md-4">
                  <label class="form-label fw-semibold" for="jornadaDiaria">Jornada Diária (h)</label>
                  <input type="number" id="jornadaDiaria" name="jornadaDiaria" class="form-control"
                         th:value="${funcionario != null ? funcionario.jornadaDiaria : 8}"
                         min="1" max="24"/>
                </div>

                <div class="col-md-4">
                  <label class="form-label fw-semibold" for="horarioEntrada">Horário de Entrada</label>
                  <input type="time" id="horarioEntrada" name="horarioEntrada" class="form-control"
                         th:value="${funcionario != null ? funcionario.horarioEntrada : '09:00'}"/>
                </div>

                <div class="col-md-4">
                  <label class="form-label fw-semibold" for="horarioSaida">Horário de Saída</label>
                  <input type="time" id="horarioSaida" name="horarioSaida" class="form-control"
                         th:value="${funcionario != null ? funcionario.horarioSaida : '18:00'}"/>
                </div>

                <div class="col-md-4">
                  <label class="form-label fw-semibold" for="intervalo">Intervalo</label>
                  <input type="text" id="intervalo" name="intervalo" class="form-control"
                         th:value="${funcionario != null ? funcionario.intervalo : '1h'}"
                         placeholder="Ex: 1h"/>
                </div>

                <div class="col-12 d-flex gap-2 pt-2">
                  <button type="submit" class="btn btn-primary">
                    <i class="bi bi-person-check me-1"></i>Cadastrar Funcionário
                  </button>
                  <a th:href="@{/funcionarios}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Cancelar
                  </a>
                </div>

              </div>
            </form>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/main.js}"></script>
</body>
</html>
