<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Erro Interno · BancoHoras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:#f1f5f9; min-height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="text-center px-4" style="max-width:440px;">
  <div style="font-size:5rem; line-height:1; color:#fecaca; margin-bottom:1rem;">
    <i class="bi bi-exclamation-triangle"></i>
  </div>
  <h1 class="fw-bold mb-1" style="font-size:4rem; color:#0f172a;">500</h1>
  <p class="text-muted mb-2" style="font-size:1rem;">
    Ocorreu um erro interno no servidor. Nossa equipe foi notificada.
  </p>
  <p class="text-muted mb-4" style="font-size:.85rem;">
    Se o problema persistir, entre em contato com o suporte.
  </p>
  <a th:href="@{/dashboard}" class="btn btn-primary me-2">
    <i class="bi bi-house me-1"></i>Voltar ao início
  </a>
  <a href="javascript:history.back()" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Página anterior
  </a>
</div>

</body>
</html>
