<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Alertas · BancoHoras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bh-layout">

  <div th:replace="~{fragments/layout :: sidebar}"></div>

  <div class="bh-main">
    <div th:replace="~{fragments/layout :: topbar('Alertas')}"></div>

    <main class="bh-content">

      <!-- Flash -->
      <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex gap-2 mb-3">
        <i class="bi bi-check-circle-fill"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Cabeçalho -->
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h5 class="fw-bold mb-0">Notificações</h5>
        <form th:action="@{/alertas/marcar-todas-lidas}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-check2-all me-1"></i>Marcar todas como lidas
          </button>
        </form>
      </div>

      <!-- Lista -->
      <div class="bh-table-card">

        <div th:if="${notificacoes == null or #lists.isEmpty(notificacoes)}"
             class="text-center text-muted py-5">
          <i class="bi bi-bell-slash d-block fs-2 mb-2"></i>
          Nenhuma notificação encontrada.
        </div>

        <div th:each="n : ${notificacoes}" class="bh-alert-item"
             th:classappend="${n.lida} ? 'opacity-75'">
          <div th:classappend="${n.lida} ? 'lida'" class="bh-alert-dot mt-1 flex-shrink-0"></div>
          <div class="bh-alert-body flex-grow-1">
            <div class="d-flex align-items-start justify-content-between gap-2">
              <div>
                <span class="badge text-bg-secondary mb-1" style="font-size:.65rem;"
                      th:text="${n.tipo}">TIPO</span>
                <div class="bh-alert-msg" th:text="${n.mensagem}">Mensagem</div>
                <div class="bh-alert-time"
                     th:text="${#temporals.format(n.dataCriacao, 'dd/MM/yyyy HH:mm')}">00/00/0000</div>
              </div>
              <div th:if="${!n.lida}">
                <form th:action="@{/alertas/{id}/marcar-lida(id=${n.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-sm btn-outline-primary py-0 px-2"
                          style="font-size:.75rem;">
                    <i class="bi bi-check2"></i>
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /card -->

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/main.js}"></script>
</body>
</html>
