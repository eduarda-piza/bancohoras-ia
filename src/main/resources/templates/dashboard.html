<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Visão Geral · BancoHoras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bh-layout">

  <!-- Sidebar -->
  <div th:replace="~{fragments/layout :: sidebar}"></div>

  <div class="bh-main">
    <!-- Topbar -->
    <div th:replace="~{fragments/layout :: topbar('Visão Geral')}"></div>

    <!-- Content -->
    <main class="bh-content">

      <!-- ── Métricas ─────────────────────────────────────── -->
      <div class="row g-3 mb-4">

        <div class="col-sm-6 col-xl-3">
          <div class="bh-card h-100">
            <div class="bh-metric-icon" style="background:#eff6ff;">
              <i class="bi bi-people-fill text-primary"></i>
            </div>
            <div class="bh-metric-value" th:text="${totalAtivos}">0</div>
            <div class="bh-metric-label">Funcionários Ativos</div>
          </div>
        </div>

        <div class="col-sm-6 col-xl-3">
          <div class="bh-card h-100">
            <div class="bh-metric-icon" style="background:#fef2f2;">
              <i class="bi bi-exclamation-triangle-fill text-danger"></i>
            </div>
            <div class="bh-metric-value text-danger" th:text="${totalCriticos}">0</div>
            <div class="bh-metric-label">Saldos Críticos (&gt;40h)</div>
          </div>
        </div>

        <div class="col-sm-6 col-xl-3">
          <div class="bh-card h-100">
            <div class="bh-metric-icon" style="background:#fffbeb;">
              <i class="bi bi-clock-history" style="color:#b45309;"></i>
            </div>
            <div class="bh-metric-value" style="color:#b45309;" th:text="${totalPendentes}">0</div>
            <div class="bh-metric-label">Aprovações Pendentes</div>
          </div>
        </div>

        <div class="col-sm-6 col-xl-3">
          <div class="bh-card h-100">
            <div class="bh-metric-icon" style="background:#f0fdf4;">
              <i class="bi bi-bell-fill text-success"></i>
            </div>
            <div class="bh-metric-value text-success" th:text="${naoLidas}">0</div>
            <div class="bh-metric-label">Notificações Novas</div>
          </div>
        </div>

      </div><!-- /métricas -->

      <div class="row g-3">

        <!-- ── Alertas Recentes ─────────────────────────── -->
        <div class="col-xl-4">
          <div class="bh-table-card h-100">
            <div class="bh-table-header">
              <span class="bh-table-title">
                <i class="bi bi-bell me-1 text-primary"></i>Alertas Recentes
              </span>
              <a th:href="@{/alertas}" class="btn btn-sm btn-outline-primary py-0 px-2"
                 style="font-size:.78rem;">Ver todos</a>
            </div>

            <div class="bh-alert-list">
              <div th:if="${#lists.isEmpty(alertas)}"
                   class="text-center text-muted py-4" style="font-size:.85rem;">
                <i class="bi bi-check2-circle d-block fs-4 mb-1"></i>
                Nenhum alerta no momento.
              </div>
              <div th:each="n : ${alertas}" class="bh-alert-item">
                <div th:classappend="${n.lida} ? 'lida'" class="bh-alert-dot"></div>
                <div class="bh-alert-body">
                  <div class="bh-alert-msg" th:text="${n.mensagem}">Mensagem</div>
                  <div class="bh-alert-time"
                       th:text="${#temporals.format(n.dataCriacao, 'dd/MM HH:mm')}">00/00</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ── Saldo da Equipe ─────────────────────────── -->
        <div class="col-xl-8">
          <div class="bh-table-card h-100">
            <div class="bh-table-header">
              <span class="bh-table-title">
                <i class="bi bi-bar-chart-line me-1 text-primary"></i>Saldo da Equipe
              </span>
              <a th:href="@{/funcionarios}" class="btn btn-sm btn-outline-primary py-0 px-2"
                 style="font-size:.78rem;">Ver tudo</a>
            </div>

            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead>
                  <tr>
                    <th>Funcionário</th>
                    <th>Cargo</th>
                    <th>Saldo</th>
                    <th>Status</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:if="${#lists.isEmpty(equipe)}">
                    <td colspan="5" class="text-center text-muted py-4">Nenhum funcionário cadastrado.</td>
                  </tr>
                  <tr th:each="banco : ${equipe}">
                    <td>
                      <div class="fw-semibold" style="font-size:.875rem;" th:text="${banco.funcionario.nome}">Nome</div>
                    </td>
                    <td>
                      <span class="text-muted" style="font-size:.82rem;" th:text="${banco.funcionario.cargo}">Cargo</span>
                    </td>
                    <td>
                      <span th:with="mins=${banco.saldoAtualMinutos}"
                            th:class="${mins > 2400} ? 'bh-semaforo bh-s-critico' : (${mins > 1200} ? 'bh-semaforo bh-s-atencao' : 'bh-semaforo bh-s-ok')"
                            th:text="${mins / 60} + 'h ' + ${mins % 60} + 'min'">0h</span>
                    </td>
                    <td>
                      <span th:with="mins=${banco.saldoAtualMinutos}">
                        <span th:if="${mins > 2400}" class="text-danger small"><i class="bi bi-circle-fill" style="font-size:.5rem;"></i> Crítico</span>
                        <span th:if="${mins > 1200 and mins <= 2400}" class="text-warning small"><i class="bi bi-circle-fill" style="font-size:.5rem;"></i> Atenção</span>
                        <span th:if="${mins <= 1200}" class="text-success small"><i class="bi bi-circle-fill" style="font-size:.5rem;"></i> OK</span>
                      </span>
                    </td>
                    <td>
                      <a th:href="@{/funcionarios/{id}(id=${banco.funcionario.id})}"
                         class="btn btn-sm btn-ghost btn-outline-secondary py-0 px-2"
                         style="font-size:.78rem;">
                        <i class="bi bi-eye"></i>
                      </a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div><!-- /row -->
    </main><!-- /content -->
  </div><!-- /main -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/main.js}"></script>
</body>
</html>
