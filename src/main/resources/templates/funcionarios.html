<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Funcionários · BancoHoras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bh-layout">

  <div th:replace="~{fragments/layout :: sidebar}"></div>

  <div class="bh-main">
    <div th:replace="~{fragments/layout :: topbar('Funcionários')}"></div>

    <main class="bh-content">

      <div class="bh-table-card">
        <div class="bh-table-header">
          <span class="bh-table-title">
            <i class="bi bi-people me-1 text-primary"></i>Saldo da Equipe
          </span>
          <span class="text-muted" style="font-size:.78rem;"
                th:text="${#lists.size(equipe)} + ' funcionários'">0 funcionários</span>
        </div>

        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>Funcionário</th>
                <th>Cargo</th>
                <th>Jornada</th>
                <th>Horário</th>
                <th>Saldo</th>
                <th>Criticidade</th>
                <th>Vencimento</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(equipe)}">
                <td colspan="8" class="text-center text-muted py-4">Nenhum funcionário cadastrado.</td>
              </tr>
              <tr th:each="banco : ${equipe}">
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <div class="bh-user-avatar" style="width:30px;height:30px;font-size:.72rem;"
                         th:text="${banco.funcionario.nome.substring(0,1).toUpperCase()}">A</div>
                    <div>
                      <div class="fw-semibold" style="font-size:.875rem;"
                           th:text="${banco.funcionario.nome}">Nome</div>
                    </div>
                  </div>
                </td>
                <td>
                  <span class="text-muted small" th:text="${banco.funcionario.cargo}">—</span>
                </td>
                <td>
                  <span class="small" th:text="${banco.funcionario.jornadaDiaria} + 'h/dia'">8h/dia</span>
                </td>
                <td>
                  <span class="small text-muted"
                        th:text="${banco.funcionario.horarioEntrada} + ' – ' + ${banco.funcionario.horarioSaida}">—</span>
                </td>
                <td>
                  <span th:with="mins=${banco.saldoAtualMinutos}"
                        th:class="${mins > 2400} ? 'bh-semaforo bh-s-critico' : (${mins > 1200} ? 'bh-semaforo bh-s-atencao' : 'bh-semaforo bh-s-ok')"
                        th:text="${mins / 60} + 'h ' + ${mins % 60} + 'min'">0h</span>
                </td>
                <td>
                  <span th:with="mins=${banco.saldoAtualMinutos}">
                    <span th:if="${mins > 2400}" class="text-danger small fw-semibold">
                      <i class="bi bi-circle-fill" style="font-size:.45rem;"></i> Crítico
                    </span>
                    <span th:if="${mins > 1200 and mins <= 2400}" class="small fw-semibold" style="color:#b45309;">
                      <i class="bi bi-circle-fill" style="font-size:.45rem;"></i> Atenção
                    </span>
                    <span th:if="${mins <= 1200}" class="text-success small fw-semibold">
                      <i class="bi bi-circle-fill" style="font-size:.45rem;"></i> OK
                    </span>
                  </span>
                </td>
                <td>
                  <span class="small text-muted"
                        th:text="${banco.dataVencimento != null ? #temporals.format(banco.dataVencimento, 'dd/MM/yyyy') : '—'}">—</span>
                </td>
                <td>
                  <a th:href="@{/funcionarios/{id}(id=${banco.funcionario.id})}"
                     class="btn btn-sm btn-outline-primary py-0 px-2" style="font-size:.78rem;">
                    <i class="bi bi-eye me-1"></i>Detalhe
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/main.js}"></script>
</body>
</html>
