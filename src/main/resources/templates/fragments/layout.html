<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-BR">
<body>

<!-- ════════════════════════════════════════════════════════
     Fragmento: SIDEBAR
     ════════════════════════════════════════════════════════ -->
<nav th:fragment="sidebar" class="bh-sidebar">

  <!-- Logo -->
  <div class="bh-sidebar-logo">
    <i class="bi bi-clock-history bh-logo-icon"></i>
    <span class="bh-logo-text">BancoHoras</span>
  </div>

  <!-- Navegação -->
  <div class="bh-nav">
    <span class="bh-nav-section">Menu</span>

    <a th:href="@{/dashboard}"
       th:classappend="${#request.requestURI eq '/dashboard'} ? 'active'"
       class="bh-nav-item">
      <i class="bi bi-speedometer2"></i>
      <span>Visão Geral</span>
    </a>

    <a th:href="@{/alertas}"
       th:classappend="${#request.requestURI eq '/alertas'} ? 'active'"
       class="bh-nav-item">
      <i class="bi bi-bell"></i>
      <span>Alertas</span>
    </a>

    <a th:href="@{/aprovacoes}"
       th:classappend="${#request.requestURI eq '/aprovacoes'} ? 'active'"
       class="bh-nav-item"
       sec:authorize="hasAnyRole('ADMIN','GESTOR','RH')">
      <i class="bi bi-check2-square"></i>
      <span>Aprovações</span>
    </a>

    <span class="bh-nav-section">Equipe</span>

    <a th:href="@{/funcionarios}"
       th:classappend="${#request.requestURI.startsWith('/funcionarios')} ? 'active'"
       class="bh-nav-item">
      <i class="bi bi-bar-chart-line"></i>
      <span>Saldo da Equipe</span>
    </a>

    <a th:href="@{/funcionarios}"
       th:classappend="${#request.requestURI.startsWith('/funcionarios')} ? 'active'"
       class="bh-nav-item">
      <i class="bi bi-people"></i>
      <span>Funcionários</span>
    </a>

    <a th:href="@{/relatorios}"
       th:classappend="${#request.requestURI eq '/relatorios'} ? 'active'"
       class="bh-nav-item"
       sec:authorize="hasAnyRole('ADMIN','GESTOR','RH')">
      <i class="bi bi-file-earmark-bar-graph"></i>
      <span>Relatórios</span>
    </a>
  </div>

  <!-- Logout -->
  <div class="bh-sidebar-footer">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="bh-nav-item">
        <i class="bi bi-box-arrow-left"></i>
        <span>Sair</span>
      </button>
    </form>
  </div>
</nav>

<!-- ════════════════════════════════════════════════════════
     Fragmento: TOPBAR  (recebe pageTitle como parâmetro)
     ════════════════════════════════════════════════════════ -->
<header th:fragment="topbar(pageTitle)" class="bh-topbar">

  <span class="bh-page-title" th:text="${pageTitle}">Página</span>

  <div class="bh-topbar-right">
    <!-- Relógio ao vivo — atualizado por main.js -->
    <span class="bh-clock" id="relogio">--:--:--</span>

    <!-- Avatar / dropdown do usuário -->
    <div class="dropdown">
      <div class="bh-user-avatar dropdown-toggle"
           data-bs-toggle="dropdown"
           aria-expanded="false"
           th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</div>
      <ul class="dropdown-menu dropdown-menu-end shadow-sm">
        <li>
          <span class="dropdown-item-text small text-muted"
                th:text="${#authentication.name}">usuario@email.com</span>
        </li>
        <li><hr class="dropdown-divider m-0"/></li>
        <li>
          <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="dropdown-item text-danger">
              <i class="bi bi-box-arrow-left me-2"></i>Sair
            </button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</header>

</body>
</html>
