<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Aprovações · BancoHoras</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bh-layout">

  <div th:replace="~{fragments/layout :: sidebar}"></div>

  <div class="bh-main">
    <div th:replace="~{fragments/layout :: topbar('Aprovações')}"></div>

    <main class="bh-content">

      <!-- Flash -->
      <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show d-flex gap-2 mb-3">
        <i class="bi bi-check-circle-fill"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${aviso}" class="alert alert-warning alert-dismissible fade show d-flex gap-2 mb-3">
        <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${aviso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Cabeçalho -->
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h5 class="fw-bold mb-0">Registros Pendentes</h5>
          <p class="text-muted mb-0" style="font-size:.82rem;"
             th:text="${#lists.size(pendentes)} + ' registro(s) aguardando aprovação'">0 registros</p>
        </div>
        <form th:action="@{/aprovacoes/lote}" method="post" id="formLote">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-success btn-sm"
                  sec:authorize="hasAnyRole('ADMIN','GESTOR','RH')">
            <i class="bi bi-check2-all me-1"></i>Aprovar Selecionados
          </button>
        </form>
      </div>

      <!-- Tabela -->
      <div class="bh-table-card">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th style="width:36px;">
                  <input type="checkbox" id="selectAll" class="form-check-input"/>
                </th>
                <th>Funcionário</th>
                <th>Entrada</th>
                <th>Saída</th>
                <th>Duração</th>
                <th>Sugestão IA</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(pendentes)}">
                <td colspan="7" class="text-center text-muted py-4">
                  <i class="bi bi-check2-circle d-block fs-3 mb-2 text-success"></i>
                  Nenhum registro pendente. Tudo em ordem!
                </td>
              </tr>
              <tr th:each="r : ${pendentes}"
                  th:classappend="${r.sugeridoPelaIA} ? 'table-purple'">
                <td>
                  <input type="checkbox" name="ids" th:value="${r.id}"
                         form="formLote" class="form-check-input row-check"/>
                </td>
                <td>
                  <span class="fw-semibold" th:text="${r.funcionario.nome}">Nome</span>
                </td>
                <td>
                  <span th:text="${#temporals.format(r.entrada, 'dd/MM/yyyy HH:mm')}">—</span>
                </td>
                <td>
                  <span th:if="${r.saida != null}"
                        th:text="${#temporals.format(r.saida, 'dd/MM/yyyy HH:mm')}">—</span>
                  <span th:if="${r.saida == null}" class="text-muted fst-italic">Em aberto</span>
                </td>
                <td>
                  <span th:if="${r.duracaoMinutos != null}"
                        th:text="${r.duracaoMinutos / 60} + 'h ' + ${r.duracaoMinutos % 60} + 'min'">—</span>
                  <span th:if="${r.duracaoMinutos == null}" class="text-muted">—</span>
                </td>
                <td>
                  <span th:if="${r.sugeridoPelaIA}" class="bh-ia">
                    <i class="bi bi-robot me-1"></i>IA
                  </span>
                  <span th:if="${r.sugeridoPelaIA and r.horarioSugeridoIA != null}"
                        class="ms-1 text-muted small" th:text="${r.horarioSugeridoIA}"></span>
                  <span th:if="${!r.sugeridoPelaIA}" class="text-muted small">Manual</span>
                </td>
                <td>
                  <div class="d-flex gap-1" sec:authorize="hasAnyRole('ADMIN','GESTOR','RH')">
                    <form th:action="@{/aprovacoes/{id}/aprovar(id=${r.id})}" method="post" class="d-inline">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-success btn-sm py-0 px-2"
                              data-bs-toggle="tooltip" title="Aprovar">
                        <i class="bi bi-check-lg"></i>
                      </button>
                    </form>
                    <form th:action="@{/aprovacoes/{id}/rejeitar(id=${r.id})}" method="post" class="d-inline">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-danger btn-sm py-0 px-2"
                              data-confirm="Rejeitar este registro de ponto?"
                              data-bs-toggle="tooltip" title="Rejeitar">
                        <i class="bi bi-x-lg"></i>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <style>
    .table-purple { background: #faf5ff !important; }
    .table-purple td:nth-child(6) { font-weight: 600; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/main.js}"></script>
</body>
</html>
