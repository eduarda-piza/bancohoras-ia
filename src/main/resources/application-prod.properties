# ============================================================
# Perfil de produção (Railway / PostgreSQL)
# Ativar com: SPRING_PROFILES_ACTIVE=prod
# ============================================================
# O DataSource é configurado via DatabaseConfig.java, que lê
# DATABASE_URL e converte de postgresql:// para jdbc:postgresql://

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf — cache ativado em produção
spring.thymeleaf.cache=true

# H2 Console desabilitado em produção
spring.h2.console.enabled=false

# Porta dinâmica do Railway
server.port=${PORT:8080}

# Logging
logging.level.com.bancohoras=INFO
logging.level.org.hibernate.SQL=WARN
