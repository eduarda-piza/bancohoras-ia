# ============================================================
# Perfil de produção (Railway / PostgreSQL)
# Ativar com: SPRING_PROFILES_ACTIVE=prod
# ============================================================

# Datasource — Railway injeta DATABASE_URL automaticamente
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari — pool conservador para planos gratuitos do Railway
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf — cache ativado em produção
spring.thymeleaf.cache=true

# H2 Console desabilitado em produção
spring.h2.console.enabled=false

# Porta dinâmica do Railway
server.port=${PORT:8080}

# Logging
logging.level.com.bancohoras=INFO
logging.level.org.hibernate.SQL=WARN
